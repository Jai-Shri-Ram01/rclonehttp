<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
</head>
<body>
<p id="status">Connecting...</p>
<script>
  fetch("https://api.github.com/gists/65e182251b673a51c2e35")
  .then(r => r.json())
  .then(data => {
    // Show raw files for debugging
    const files = data.files;
    if (!files) {
      document.getElementById("status").textContent = "❌ No files: " + JSON.stringify(data);
      return;
    }

    // Get first file regardless of name
    const firstFile = Object.values(files)[0];
    const url = firstFile.content.trim();

    document.getElementById("status").textContent = "✅ Redirecting: " + url;
    window.location.replace(url);
  })
  .catch(err => {
    document.getElementById("status").textContent = "❌ Error: " + err;
  });
</script>
</body>
</html>
