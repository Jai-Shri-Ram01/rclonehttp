<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
</head>
<body>
<p id="status">Connecting to server...</p>
<script>
  fetch("https://api.github.com/gists/65e182251b673a51c2e35", {
    cache: "no-store"
  })
  .then(r => r.json())
  .then(data => {
    const url = data.files["url.txt"].content.trim();
    document.getElementById("status").textContent = "✅ Redirecting to: " + url;
    window.location.replace(url);
  })
  .catch(err => {
    document.getElementById("status").textContent = "❌ Server offline: " + err;
  });
</script>
</body>
</html>
