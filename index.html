<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body>
<p id="status">Connecting to server...</p>
<script>
  const GIST_ID = "your_gist_id_here";

  fetch(`https://api.github.com/gists/${GIST_ID}`)
    .then(r => r.json())
    .then(data => {
      const url = data.files["url.txt"].content.trim();
      document.getElementById("status").textContent = "✅ Redirecting to " + url;
      window.location.href = url;
    })
    .catch(() => {
      document.getElementById("status").textContent = "❌ Server offline";
    });
</script>
</body>
</html>
```

---

## How it now works
```
Script starts → gets Cloudflare URL
      ↓
Updates GitHub Gist (url.txt) via API
      ↓
User visits GitHub Page
      ↓
Page fetches Gist → reads URL → redirects ✅
